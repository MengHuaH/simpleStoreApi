services:
  # MySQL 5.7 数据库
  mysql:
    image: mysql:5.7
    container_name: simple-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: simple_store
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simple-store-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis 缓存
  redis:
    image: redis:latest
    container_name: simple-store-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - simple-store-network
    command: redis-server --appendonly yes

  # NestJS 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-store-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=app_user
      - DB_PASSWORD=app_password
      - DB_DATABASE=simple_store
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_KEY_PREFIX=simple-store
      - JWT_SECRET=your-jwt-secret
      - JWT_EXPIRES_IN=3600
    depends_on:
      - mysql
      - redis
    networks:
      - simple-store-network
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
  redis_data:

networks:
  simple-store-network:
    driver: bridge
